freyja.ring.replication-factor=2
freyja.ring.sync-enabled=true
freyja.ring.nodes-url=https://examples.impactradius.com/knut/freyja.json
freyja.ring.sync-interval-ms=30000

# Self-identity. Defaults: id=${spring.application.name}-${server.port},
# host=local IP, port=${server.port}. Override per instance.
#freyja.node.id=
#freyja.node.host=
#freyja.node.port=

# Cache eviction sweep cadence (300s TTL is a fixed business rule).
freyja.cache.sweep-interval-ms=30000

# How often the cluster-status aggregator polls peer nodes for metrics.
freyja.cluster-status.poll-interval-ms=2000

spring.application.name=freyja

management.endpoints.web.exposure.include=health,info,metrics
