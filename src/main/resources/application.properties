freyja.ring.replication-factor=3
freyja.ring.sync-enabled=false
freyja.ring.nodes-url=
freyja.ring.sync-interval-ms=30000

# Self-identity. Defaults: id=${spring.application.name}-${server.port},
# host=local IP, port=${server.port}. Override per instance.
#freyja.node.id=
#freyja.node.host=
#freyja.node.port=

# Cache eviction sweep cadence (300s TTL is a fixed business rule).
freyja.cache.sweep-interval-ms=30000

spring.application.name=freyja
